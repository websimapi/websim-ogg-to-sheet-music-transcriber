<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OGG to Sheet Music Transcriber</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "vexflow": "https://esm.sh/vexflow@4.2.3"
            }
        }
    </script>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Audio to Score</h1>
            <p>Load an OGG/Audio file to transcribe to sheet music.</p>
        </header>

        <div class="controls-area">
            <div class="file-input-wrapper">
                <input type="file" id="audioInput" accept=".ogg,.mp3,.wav">
                <label for="audioInput" class="btn primary">📂 Upload OGG/Audio</label>
                <button id="loadDemoBtn" class="btn secondary">Load Demo</button>
            </div>
            
            <div class="playback-controls">
                <button id="playBtn" class="btn action" disabled>▶ Play & Transcribe</button>
                <button id="pauseBtn" class="btn action" disabled>⏸ Pause</button>
                <button id="clearBtn" class="btn">Clear Score</button>
            </div>
        </div>

        <div class="mixer-area">
            <h3>Advanced Isolation & Dynamics</h3>
            <p class="small-text">Fine-tune audio filtering to isolate specific instruments.</p>
            
            <div class="filter-controls">
                <div class="control-row">
                    <label>Detection Threshold (Gate)</label>
                    <input type="range" id="thresholdInput" min="0" max="0.2" step="0.001" value="0.03">
                </div>
                
                <div class="control-row mode-select">
                    <label>Filter Mode:</label>
                    <select id="filterMode">
                        <option value="eq">3-Band EQ</option>
                        <option value="bandpass">Precision Focus (Bandpass)</option>
                    </select>
                </div>

                <!-- EQ Controls -->
                <div id="eqControls" class="sliders">
                    <div class="slider-group">
                        <label>Low</label>
                        <input type="range" id="bassGain" min="-30" max="10" value="0">
                    </div>
                    <div class="slider-group">
                        <label>Mid</label>
                        <input type="range" id="midGain" min="-30" max="10" value="0">
                    </div>
                    <div class="slider-group">
                        <label>High</label>
                        <input type="range" id="highGain" min="-30" max="10" value="0">
                    </div>
                    <div class="slider-group checkbox-group">
                         <label>Auto-EQ</label>
                         <label class="switch">
                            <input type="checkbox" id="autoFilterBtn">
                            <span class="slider round"></span>
                        </label>
                    </div>
                </div>

                <!-- Bandpass Controls (Hidden by default) -->
                <div id="bandpassControls" class="sliders hidden">
                    <div class="slider-group wide">
                        <label>Center Frequency (<span id="freqVal">1000</span>Hz)</label>
                        <input type="range" id="bpFreq" min="50" max="5000" step="10" value="1000">
                    </div>
                    <div class="slider-group">
                        <label>Width (Q)</label>
                        <input type="range" id="bpQ" min="0.1" max="10" step="0.1" value="1">
                    </div>
                </div>
            </div>
        </div>

        <div class="visualization-area">
            <canvas id="frequencyCanvas" height="60"></canvas>
            <div class="note-display">Detected: <span id="currentNote">--</span></div>
        </div>

        <div class="sheet-music-container" id="sheetContainer">
            <div id="canvasWrapper"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
