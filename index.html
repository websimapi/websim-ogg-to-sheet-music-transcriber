<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OGG to Sheet Music Transcriber</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "vexflow": "https://esm.sh/vexflow@4.2.3"
            }
        }
    </script>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Audio to Score</h1>
            <p>Load an OGG/Audio file to transcribe to sheet music.</p>
        </header>

        <div class="controls-area">
            <div class="file-input-wrapper">
                <input type="file" id="audioInput" accept=".ogg,.mp3,.wav">
                <label for="audioInput" class="btn primary">📂 Upload OGG/Audio</label>
                <button id="loadDemoBtn" class="btn secondary">Load Demo</button>
            </div>
            
            <div class="playback-controls">
                <button id="playBtn" class="btn action" disabled>▶ Play</button>
                <button id="pauseBtn" class="btn action" disabled>⏸ Pause</button>
                <button id="resetBtn" class="btn">Reset</button>
            </div>

            <div class="speed-control">
                 <label>Analysis Speed (Slow Down): <span id="speedVal">1.0</span>x</label>
                 <input type="range" id="speedInput" min="0.1" max="1.0" step="0.1" value="1.0">
            </div>
        </div>

        <div class="global-actions">
            <button id="addTrackBtn" class="btn secondary full-width">+ Add Isolation Part</button>
        </div>

        <div id="tracksContainer">
            <!-- Tracks will be injected here via JS -->
        </div>

        <!-- Hidden Template for Track -->
        <template id="trackTemplate">
            <div class="track-card">
                <div class="track-header">
                    <h3 class="track-title">Part 1</h3>
                    <div class="track-actions">
                        <button class="btn-clear small">Clear Notes</button>
                        <button class="btn-remove small">✕</button>
                    </div>
                </div>

                <div class="mixer-section">
                    <div class="control-row">
                        <label>Detection Threshold</label>
                        <input type="range" class="threshold-input" min="0" max="0.3" step="0.001" value="0.03">
                    </div>
                    
                    <div class="control-row mode-select">
                        <label>Filter Mode:</label>
                        <select class="filter-mode">
                            <option value="eq">3-Band EQ</option>
                            <option value="bandpass">Precision Focus (Bandpass)</option>
                        </select>
                    </div>

                    <!-- EQ Controls -->
                    <div class="eq-controls sliders">
                        <div class="slider-group">
                            <label>Low</label>
                            <input type="range" class="bass-gain" min="-30" max="20" value="0">
                        </div>
                        <div class="slider-group">
                            <label>Mid</label>
                            <input type="range" class="mid-gain" min="-30" max="20" value="0">
                        </div>
                        <div class="slider-group">
                            <label>High</label>
                            <input type="range" class="high-gain" min="-30" max="20" value="0">
                        </div>
                    </div>

                    <!-- Bandpass Controls -->
                    <div class="bandpass-controls sliders hidden">
                        <div class="slider-group wide">
                            <label>Freq (<span class="freq-val">1000</span>Hz)</label>
                            <input type="range" class="bp-freq" min="50" max="5000" step="10" value="1000">
                        </div>
                        <div class="slider-group">
                            <label>Q</label>
                            <input type="range" class="bp-q" min="0.1" max="20" step="0.1" value="1">
                        </div>
                    </div>
                </div>

                <div class="visualization-area">
                    <canvas class="freq-canvas" height="60"></canvas>
                    <div class="note-display">Detected: <span class="current-note">--</span></div>
                </div>

                <div class="sheet-music-container">
                    <div class="canvas-wrapper"></div>
                </div>
            </div>
        </template>
    </div>

    <script type="module" src="app.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
