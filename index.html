<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OGG to Sheet Music Transcriber</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "vexflow": "https://esm.sh/vexflow@4.2.3"
            }
        }
    </script>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Audio to Score</h1>
            <p>Load an OGG/Audio file to transcribe to sheet music.</p>
        </header>

        <div class="controls-area">
            <div class="file-input-wrapper">
                <input type="file" id="audioInput" accept=".ogg,.mp3,.wav">
                <label for="audioInput" class="btn primary">📂 Upload OGG/Audio</label>
                <button id="loadDemoBtn" class="btn secondary">Load Demo</button>
            </div>
            
            <div class="playback-controls">
                <button id="playBtn" class="btn action" disabled>▶ Play & Transcribe</button>
                <button id="pauseBtn" class="btn action" disabled>⏸ Pause</button>
                <button id="clearBtn" class="btn">Clear Score</button>
            </div>

            <div class="speed-control">
                <label>Playback Speed: <span id="speedDisplay">1.0</span>x</label>
                <input type="range" id="playbackSpeed" min="0.1" max="1.5" step="0.1" value="1.0">
                <small class="hint">Slow down to improve analysis accuracy</small>
            </div>
        </div>

        <div id="tracksContainer">
            <!-- Dynamic Tracks will be inserted here -->
        </div>

        <div class="add-track-area">
            <button id="addTrackBtn" class="btn secondary full-width">+ Add Isolation Track</button>
        </div>

        <div class="visualization-area">
            <canvas id="frequencyCanvas" height="100"></canvas>
            <!-- Note display will be per-track now, handled inside canvas or separate UI -->
        </div>

        <div class="sheet-music-container" id="sheetContainer">
            <div id="canvasWrapper"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>

</body>
</html>
